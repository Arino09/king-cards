# 推送至默认分支时构建并部署到 GitHub Pages（项目站：https://<用户>.github.io/<仓库名>/）
# 与官方 Pages 模板一致：upload-pages-artifact@v3 + deploy-pages@v5
name: 部署 GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:pages
      - name: 配置 Pages 元数据
        uses: actions/configure-pages@v5
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v5
